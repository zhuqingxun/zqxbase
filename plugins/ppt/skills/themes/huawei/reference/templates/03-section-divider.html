<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><title>03 · 章节分隔</title>
<link rel="stylesheet" href="../assets/theme.css"><link rel="stylesheet" href="../assets/deck-base.css">

<style>
  .sect{background:var(--c-ink-dark);color:#F4F4F4;padding:0 var(--s-px)}
  .sect-inner{width:100%;display:grid;grid-template-columns:380px 1fr;gap:80px;align-items:center;height:100%}
  .sect .big{font-size:360px;font-weight:200;line-height:.85;color:var(--c-primary);letter-spacing:-.04em}
  .sect .ek{color:var(--c-primary);font-family:var(--f-mono);font-size:22px;letter-spacing:.22em;margin-bottom:32px;display:flex;align-items:center;gap:14px}
  .sect .ek::before{content:'';width:54px;height:2px;background:var(--c-primary)}
  .sect h2{font-size:88px;font-weight:500;margin:0 0 22px;line-height:1.1;color:#FAFAFA;letter-spacing:-.01em}
  .sect p{color:rgba(255,255,255,.7);font-size:30px;max-width:1100px;line-height:1.5;font-weight:300;margin:0}</style></head><body>

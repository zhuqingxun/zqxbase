meta:
  title: "Huawei theme smoke deck"
  theme: huawei
narrative:
  thesis: "一次性跑通 18 个新 visual_type"
  arc: "cover → toc → section → P0 data/struct → P1 → P2 → thankyou"
  total_slides: 18
slides:
  - id: 1
    role: title
    visual_type: cover-left-bar
    content:
      title: "华为主题 Smoke"
      subtitle: "18 版式一次性验证"
      eyebrow: "2026 年度"
      meta:
        - label: "编号"
          value: "SMOKE-01"

  - id: 2
    role: content
    visual_type: toc
    content:
      title: "目录"
      giant_label: "目录"
      items:
        - title: "背景"
          page: "03"
        - title: "定位"
          page: "07"
        - title: "能力"
          page: "11"

  - id: 3
    role: section
    visual_type: section-divider-dark
    content:
      title: "战略定位"
      description: "三年一盘棋。"
      number: "01"
      eyebrow: "Chapter One"

  - id: 4
    role: data
    visual_type: kpi-stats
    content:
      title: "核心指标"
      kpis:
        - label: "营收"
          value: "128"
          unit: "亿"
          trend: "up"
          trend_text: "+12%"
        - label: "毛利"
          value: "38"
          unit: "%"
          trend: "up"
          trend_text: "+2pp"
        - label: "客户"
          value: "2340"
          trend: "flat"
          trend_text: "持平"
        - label: "CAC"
          value: "4120"
          unit: "元"
          trend: "down"
          trend_text: "-8%"

  - id: 5
    role: content
    visual_type: matrix-2x2
    content:
      title: "组合矩阵"
      x_axis: "盈利（弱 → 强）"
      y_axis: "增长（低 → 高）"
      quadrants:
        - heading: "明星"
          desc: "高增长高盈利。"
          tag: "Q1"
          highlight: true
        - heading: "问题"
          desc: "高增长低盈利。"
          tag: "Q2"
        - heading: "瘦狗"
          desc: "低增长低盈利。"
          tag: "Q3"
        - heading: "现金牛"
          desc: "低增长高盈利。"
          tag: "Q4"

  - id: 6
    role: content
    visual_type: architecture-layered
    content:
      title: "分层架构"
      layers:
        - name: "接入"
          label: "L1"
          cells:
            - title: "门户"
            - title: "网关"
        - name: "服务"
          label: "L2"
          cells:
            - title: "业务"
              highlight: true
            - title: "支撑"
        - name: "数据"
          label: "L3"
          cells:
            - title: "存储"

  - id: 7
    role: content
    visual_type: timeline-huawei
    content:
      title: "发展历程"
      phases:
        - year: "2023"
          title: "起步"
          desc: "种子客户"
        - year: "2025"
          title: "扩张"
          desc: "破亿"
        - year: "2026"
          title: "规模"
          desc: "区域分中心"

  - id: 8
    role: content
    visual_type: process-flow-huawei
    content:
      title: "交付流程"
      steps:
        - title: "澄清"
          desc: "访谈分级。"
        - title: "设计"
          desc: "架构对齐。"
        - title: "交付"
          desc: "灰度上线。"
        - title: "运维"
          desc: "SLA 迭代。"

  - id: 9
    role: content
    visual_type: swot
    content:
      title: "SWOT"
      strengths: ["技术深", "团队稳"]
      weaknesses: ["渠道弱"]
      opportunities: ["数字化加速"]
      threats: ["头部下探"]

  - id: 10
    role: content
    visual_type: roadmap
    content:
      title: "路线图"
      phases: ["2026", "2027", "2028"]
      lanes:
        - name: "产品"
          bars:
            - start: 0
              span: 1
              emphasis: "primary"
              label: "稳定"
            - start: 1
              span: 1
              emphasis: "default"
              label: "扩展"
            - start: 2
              span: 1
              emphasis: "accent"
              label: "平台化"
        - name: "运营"
          bars:
            - start: 0
              span: 1
              emphasis: "default"
              label: "试点"
            - start: 1
              span: 2
              emphasis: "primary"
              label: "复制 + 沉淀"

  - id: 11
    role: content
    visual_type: pyramid
    content:
      title: "能力金字塔"
      levels:
        - title: "愿景"
          desc: "三年前三。"
        - title: "战略"
          desc: "聚焦头部。"
        - title: "能力"
          desc: "三叉戟。"

  - id: 12
    role: data
    visual_type: heatmap-matrix
    content:
      title: "能力热力图"
      columns: ["技术", "产品", "运营"]
      rows:
        - label: "团队 A"
          scores: [5, 4, 3]
          total: "12"
        - label: "团队 B"
          scores: [3, 5, 4]
          total: "12"
        - label: "团队 C"
          scores: [2, 3, 5]
          total: "10"

  - id: 13
    role: content
    visual_type: cards-6
    content:
      title: "六大能力"
      key_points:
        - heading: "平台"
          body: "中台统一。"
        - heading: "数据"
          body: "闭环治理。"
        - heading: "算法"
          body: "模型沉淀。"
        - heading: "产品"
          body: "可组装。"
        - heading: "服务"
          body: "全旅程。"
        - heading: "生态"
          body: "伙伴协同。"

  - id: 14
    role: content
    visual_type: rings
    content:
      title: "同心圈"
      rings:
        - label: "生态"
        - label: "能力"
        - label: "内核"
      steps:
        - title: "内核"
          desc: "不可替代能力。"
        - title: "能力"
          desc: "产品化服务化。"

  - id: 15
    role: content
    visual_type: personas
    content:
      title: "画像"
      personas:
        - role: "决策者"
          name: "李总"
          quote: "要看增长。"
        - role: "使用者"
          name: "王工"
          quote: "流程越少越好。"

  - id: 16
    role: content
    visual_type: risk-list
    content:
      title: "风险清单"
      risks:
        - title: "人员流失"
          desc: "关键岗位无备份。"
          severity: "HIGH"
        - title: "供应单点"
          desc: "上游集中。"
          severity: "MED"

  - id: 17
    role: content
    visual_type: governance
    content:
      title: "治理架构"
      top_box:
        title: "战略决策委员会"
        desc: "Chair 主持。"
      units:
        - title: "战略专委会"
          desc: "长期路径、优先级。"
        - title: "技术专委会"
          desc: "架构评审。"

  - id: 18
    role: closing
    visual_type: thankyou
    content:
      title: "Thank you."
      subtitle: "期待交流。"
      contacts:
        - label: "邮箱"
          value: "contact@example.com"
        - label: "官网"
          value: "example.com"
